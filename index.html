<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #f6e05e; /* Le jaune de l'image */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Urbanist', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- BARRE DE NAVIGATION --- */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 24px;
        }
        .logo span { color: var(--accent-color); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        /* --- BOUTONS SPECIAUX --- */
        .btn-contact {
            background-color: var(--accent-color);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-contact:hover { opacity: 0.8; }

        #translate-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        /* --- SECTION HERO (MILIEU) --- */
        .hero {
            text-align: center;
            margin-top: 15vh;
            max-width: 900px;
        }

        .hero h1 {
            font-size: 60px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .highlight {
            background-color: white;
            color: black;
            padding: 5px 20px;
            display: inline-block;
            border-radius: 10px;
            margin-top: 10px;
        }

        .btn-work {
            margin-top: 40px;
            display: inline-block;
            background-color: #1a1a1a;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            border: 1px solid #333;
        }

        /* --- GESTION TRADUCTION --- */
        .lang-en { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Louis<span>.</span></div>
        
        <nav class="nav-links">
            <button id="translate-btn" onclick="toggleLanguage()">EN</button>
            
            <a href="#" class="lang-fr">Accueil</a>
            <a href="#" class="lang-en">Home</a>
            
            <a href="#" class="lang-fr">Parcours</a>
            <a href="#" class="lang-en">Career</a>
            
            <a href="#" class="lang-fr">Projets</a>
            <a href="#" class="lang-en">Projects</a>

            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=l.saintoureinpro@gmail.com" target="_blank" class="btn-contact">
                <span class="lang-fr">Me contacter</span>
                <span class="lang-en">Contact me</span>
            </a>
        </nav>
    </header>

    <main class="hero">
        <h1 class="lang-fr">Bonjour, je suis <br> <span class="highlight">étudiant en 1ère année de BUT GEII</span></h1>
        <h1 class="lang-en">Hello, I am <br> <span class="highlight">1st year student in BUT GEII</span></h1>

        <a href="#" class="btn-work">
            <span class="lang-fr">Voir mon travail</span>
            <span class="lang-en">See my work</span>
        </a>
    </main>

    <script>
        function toggleLanguage() {
            const frElements = document.querySelectorAll('.lang-fr');
            const enElements = document.querySelectorAll('.lang-en');
            const btn = document.getElementById('translate-btn');

            if (btn.innerText === "EN") {
                frElements.forEach(el => el.style.display = 'none');
                enElements.forEach(el => el.style.display = 'inline-block');
                btn.innerText = "FR";
            } else {
                frElements.forEach(el => el.style.display = 'inline-block');
                enElements.forEach(el => el.style.display = 'none');
                btn.innerText = "EN";
            }
        }
    </script>
</body>
</html>
